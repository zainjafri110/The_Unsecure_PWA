{% extends 'layout.html' %}

{% block content %}
<h1>Two-Factor Authentication</h1>
<h2>Welcome back, {{ username }}!</h2>

<div class="box">
    <h3>Enter Verification Code</h3>
    <p>Open your Google Authenticator app and enter the 6-digit code:</p>
    
    <form action="/2fa-login.html" method="post" class="box">
        {{ form.csrf_token }}
        <div class="input__wrapper">
            <input
                type="text"
                name="otp"
                id="otp"
                placeholder="Enter 6-digit code"
                maxlength="6"
                pattern="[0-9]{6}"
                class="input__field"
                required
                autofocus
            />
        </div>
        <div class="input__wrapper">
            <input type="submit" class="btn" value="Verify & Login" />
        </div>
    </form>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
</div>
{% endblock %}
